<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Периметр — телефон героя</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="phone-wrap">
    <section class="phone">
      <div class="speaker"></div>
      <div class="screen">
        <header class="topbar">
          <span id="time">03:07</span>
          <span>PX‑17</span>
        </header>

        <section class="hero-card">
          <p class="eyebrow">НИИ «ПЕРИМЕТР»</p>
          <h1>Телефон героя</h1>
          <p id="statusText">Связь нестабильна. Объект частично активен.</p>
        </section>

        <section class="grid">
          <button data-app="map">🗺<span>Карта</span></button>
          <button data-app="inventory">🎒<span>Инвентарь</span></button>
          <button data-app="docs">📄<span>Документы</span></button>
          <button data-app="radio">📻<span>Рация</span></button>
          <button data-app="team">👥<span>Команда</span></button>
          <button data-app="gallery">📸<span>Галерея</span></button>
        </section>

        <section class="app-panel" id="appPanel">
          <h2>Сводка</h2>
          <p>Выберите приложение. Данные будут открываться по мере прохождения: карты, документы, предметы, фотографии и сообщения по рации.</p>
        </section>
      </div>
      <div class="home-light"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
