name: Deploy Living Garden PWA to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate and prepare site
        id: validate
        run: |
          node --check app.js
          node --check sw.js
          node -e "JSON.parse(require('fs').readFileSync('manifest.webmanifest', 'utf8'))"
          mkdir -p _site
          cp index.html styles.css app.js sw.js manifest.webmanifest icon.svg _site/

      - name: Configure Pages
        id: configure
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        id: upload
        if: always() && steps.validate.outcome == 'success' && steps.configure.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        if: always() && steps.upload.outcome == 'success'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Publish deployment status
        if: always()
        env:
          COMMIT_SHA: ${{ github.sha }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          CONFIGURE_OUTCOME: ${{ steps.configure.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          python - <<'PY'
          import json, os
          status = {
              "commit": os.environ.get("COMMIT_SHA", ""),
              "validate": os.environ.get("VALIDATE_OUTCOME", ""),
              "configure": os.environ.get("CONFIGURE_OUTCOME", ""),
              "upload": os.environ.get("UPLOAD_OUTCOME", ""),
              "deploy": os.environ.get("DEPLOY_OUTCOME", ""),
              "page_url": os.environ.get("PAGE_URL", ""),
          }
          with open('/tmp/deployment-status.json', 'w', encoding='utf-8') as f:
              json.dump(status, f, ensure_ascii=False, indent=2)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan deployment-status
          git rm -rf .
          git clean -fdx
          cp /tmp/deployment-status.json deployment-status.json
          git add deployment-status.json
          git commit -m "Record Pages deployment status for $COMMIT_SHA"
          git push origin HEAD:deployment-status --force
