<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Периметр — карта комплекса</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="map-shell">
    <section class="map-card">
      <div class="map-header">
        <div>
          <p class="eyebrow">НИИ «ПЕРИМЕТР» · СЛУЖЕБНАЯ КАРТА</p>
          <h1>Карта объекта</h1>
        </div>
        <div class="status">
          <span id="dayLabel">День 1</span>
          <span id="timeLabel">07:50</span>
        </div>
      </div>

      <div class="map-board" id="mapBoard">
        <svg viewBox="0 0 1000 900" aria-label="Карта комплекса Периметр">
          <defs>
            <filter id="chalk">
              <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" result="noise" />
              <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" />
            </filter>
          </defs>

          <rect x="25" y="25" width="950" height="850" rx="18" class="outer" />

          <text x="70" y="65" class="level-title">ЭТАЖ 1</text>
          <g class="level" data-level="floor1">
            <path d="M130 285 C210 250, 270 225, 340 210 S480 200, 550 170 S680 135, 805 95" class="road" />
            <path d="M138 285 C210 252, 270 228, 340 213 S480 203, 550 173 S680 138, 805 98" class="road-glow" />

            <g class="location" data-id="checkpoint"><rect x="96" y="250" width="120" height="70" /><text x="156" y="344">КПП</text></g>
            <g class="location" data-id="yard"><rect x="280" y="210" width="140" height="85" /><text x="350" y="323">ДВОР</text></g>
            <g class="location" data-id="hall"><rect x="445" y="165" width="150" height="88" /><text x="520" y="275">ХОЛЛ</text></g>
            <g class="location" data-id="canteen"><rect x="430" y="300" width="160" height="85" /><text x="510" y="406">СТОЛОВАЯ</text></g>
            <g class="location" data-id="archive"><rect x="620" y="160" width="150" height="80" /><text x="695" y="264">АРХИВ</text></g>
            <g class="location" data-id="medbay"><rect x="635" y="300" width="155" height="86" /><text x="712" y="410">МЕДБЛОК</text></g>
            <g class="location danger" data-id="lab"><rect x="750" y="85" width="170" height="88" /><text x="835" y="195">ЛАБ. PX-17</text></g>
            <g class="location" data-id="server"><rect x="500" y="45" width="155" height="85" /><text x="578" y="153">СЕРВЕРНАЯ</text></g>
            <g class="location" data-id="garage"><rect x="210" y="55" width="170" height="90" /><text x="295" y="168">ГАРАЖ</text></g>
          </g>

          <text x="70" y="455" class="level-title">ТЕХНИЧЕСКИЙ УРОВЕНЬ</text>
          <g class="level" data-level="tech">
            <g class="location" data-id="generator"><rect x="390" y="500" width="210" height="85" /><text x="495" y="610">ГЕНЕРАТОРНАЯ</text></g>
            <g class="location" data-id="electrical"><rect x="115" y="500" width="190" height="85" /><text x="210" y="610">ЭЛЕКТРОЩИТ</text></g>
            <g class="location" data-id="storage"><rect x="675" y="500" width="200" height="85" /><text x="775" y="610">СКЛАД ХИМИИ</text></g>
            <g class="location" data-id="vents"><rect x="420" y="640" width="170" height="78" /><text x="505" y="740">ВЕНТИЛЯЦИЯ</text></g>
            <path d="M305 542 L390 542 M600 542 L675 542 M505 585 L505 640" class="road" />
          </g>

          <text x="70" y="785" class="level-title">ПОДЗЕМНЫЙ УРОВЕНЬ</text>
          <g class="level" data-level="underground">
            <g class="location danger" data-id="px17_storage"><rect x="375" y="805" width="230" height="65" /><text x="490" y="890">ХРАНИЛИЩЕ PX-17</text></g>
            <g class="location danger" data-id="test_chambers"><rect x="95" y="805" width="225" height="65" /><text x="207" y="890">ИСП. КАМЕРЫ</text></g>
            <g class="location danger" data-id="central_lab"><rect x="665" y="805" width="230" height="65" /><text x="780" y="890">ЦЕНТР. ЛАБ.</text></g>
            <path d="M320 838 L375 838 M605 838 L665 838" class="road" />
          </g>
        </svg>

        <div id="markersLayer" class="markers-layer"></div>
      </div>

      <aside class="panel">
        <h2>Открытые карты</h2>
        <div id="mapList" class="map-list"></div>
        <h2>Состояние команды</h2>
        <div id="heroList" class="hero-list"></div>
        <p class="hint">Карта открывается по найденным планшетам и схемам. Если уровень не найден, он скрыт как засекреченный.</p>
      </aside>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
