<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Периметр — карта комплекса</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="map-shell">
    <section class="map-card">
      <div class="map-header">
        <div>
          <p class="eyebrow">НИИ «ПЕРИМЕТР»</p>
          <h1>Карта объекта</h1>
        </div>
        <div class="status">
          <span id="dayLabel">День 1</span>
          <span id="timeLabel">07:50</span>
        </div>
      </div>

      <div class="map-board" id="mapBoard">
        <svg viewBox="0 0 1000 640" aria-label="Карта комплекса Периметр">
          <defs>
            <filter id="chalk">
              <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" result="noise" />
              <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" />
            </filter>
          </defs>

          <rect x="25" y="25" width="950" height="590" rx="18" class="outer" />
          <path d="M130 490 C210 430, 270 385, 340 360 S480 340, 550 300 S680 245, 805 155" class="road" />
          <path d="M138 490 C210 432, 270 388, 340 363 S480 343, 550 303 S680 248, 805 158" class="road-glow" />

          <g class="location" data-id="checkpoint">
            <rect x="96" y="452" width="120" height="70" />
            <text x="156" y="545">КПП</text>
          </g>
          <g class="location" data-id="yard">
            <rect x="280" y="390" width="140" height="85" />
            <text x="350" y="500">ДВОР</text>
          </g>
          <g class="location" data-id="hall">
            <rect x="445" y="330" width="150" height="88" />
            <text x="520" y="440">ХОЛЛ</text>
          </g>
          <g class="location" data-id="canteen">
            <rect x="430" y="470" width="160" height="85" />
            <text x="510" y="575">СТОЛОВАЯ</text>
          </g>
          <g class="location" data-id="archive">
            <rect x="620" y="315" width="150" height="80" />
            <text x="695" y="420">АРХИВ</text>
          </g>
          <g class="location" data-id="medbay">
            <rect x="635" y="455" width="155" height="86" />
            <text x="712" y="562">МЕДБЛОК</text>
          </g>
          <g class="location danger" data-id="lab">
            <rect x="750" y="220" width="170" height="88" />
            <text x="835" y="330">ЛАБ. PX-17</text>
          </g>
          <g class="location danger" data-id="underground">
            <rect x="700" y="82" width="190" height="86" />
            <text x="795" y="190">НИЖНИЙ УРОВЕНЬ</text>
          </g>
          <g class="location" data-id="server">
            <rect x="500" y="145" width="155" height="85" />
            <text x="578" y="252">СЕРВЕРНАЯ</text>
          </g>
          <g class="location" data-id="garage">
            <rect x="210" y="210" width="170" height="90" />
            <text x="295" y="323">ГАРАЖ</text>
          </g>
        </svg>

        <div id="markersLayer" class="markers-layer"></div>
      </div>

      <aside class="panel">
        <h2>Состояние команды</h2>
        <div id="heroList" class="hero-list"></div>
        <p class="hint">Карта обновляется от сцены. В Telegram бот сможет передавать текущий день, время и позиции через параметры ссылки.</p>
      </aside>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
